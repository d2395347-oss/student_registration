<!DOCTYPE html>
<html>
<head>
    <title>All Students</title>
    <style>
        body {
            font-family: Arial;
            margin: 20px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        th, td {
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: #333;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        .empty {
            margin-top: 20px;
            color: red;
        }
    </style>
</head>

<body>

<h2>All Students</h2>

<table border="1">

<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Father</th>
    <th>Caste</th>
    <th>Phone</th>
    <th>Aadhaar</th>
</tr>

{% if students %}
    {% for s in students %}
    <tr>
        <td>{{ s[0] }}</td>
        <td>{{ s[1] }}</td>
        <td>{{ s[2] }}</td>
        <td>{{ s[3] }}</td>
        <td>{{ s[4] }}</td>
        <td>{{ s[5] }}</td>
    </tr>
    {% endfor %}
{% else %}
    <tr>
        <td colspan="6" class="empty">No students found</td>
    </tr>
{% endif %}

</table>

</body>
</html>
