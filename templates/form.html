<!DOCTYPE html>
<html>
<head>
    <title>Student Registration</title>
    <link rel="stylesheet" href="/static/style.css">
    <script>
    function sendOTP() {
        let phone = document.getElementById('phone').value;

        fetch('/send_otp', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: 'phone=' + phone
        })
        .then(res => res.json())
        .then(data => alert(data.message));
    }

    function verifyOTP() {
        let phone = document.getElementById('phone').value;
        let otp = document.getElementById('otp').value;

        fetch('/verify_otp', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: 'phone=' + phone + '&otp=' + otp
        })
        .then(res => res.json())
        .then(data => alert(data.message));
    }
    </script>
</head>
<body>

<div class="container">
    <h2>Student Registration</h2>

    <form action="/submit" method="POST">

        <input type="text" name="name" placeholder="Full Name" required>
        <input type="text" name="father_name" placeholder="Father Name" required>
        <input type="text" name="caste" placeholder="your caste" required>

        <input type="email" name="email" placeholder="Email" required>

        <div class="row">
            <input type="text" id="phone" name="phone" placeholder="Phone Number" required>
            <button type="button" onclick="sendOTP()">Send OTP</button>
        </div>

        <div class="row">
            <input type="text" id="otp" placeholder="Enter OTP">
            <button type="button" onclick="verifyOTP()">Verify</button>
        </div>

        <input type="text" name="aadhaar" placeholder="Aadhaar Number" required>

        <button type="submit">Register</button>

    </form>
</div>

</body>
</html>
