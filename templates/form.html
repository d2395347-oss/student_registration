<body>

<div class="container">

<h2>Student Registration</h2>

<form action="/submit" method="POST" onsubmit="checkForm(event)">

```
<input type="text" name="name" placeholder="Full Name" required>

<input type="text" name="father_name" placeholder="Father Name" required>

<input type="text" name="caste" placeholder="Caste" required>

<div class="otp-row">
    <input type="text" id="phone" name="phone" placeholder="Phone Number" required>
    <button type="button" onclick="sendOTP()">Send OTP</button>
</div>

<div class="otp-row">
    <input type="text" id="otp" placeholder="Enter OTP" maxlength="6">
    <button type="button" onclick="verifyOTP()">Verify</button>
</div>

<p id="status"></p>

<input type="text" name="aadhaar" placeholder="Aadhaar Number" maxlength="12" required>

<button type="submit">Register</button>
```

</form>

<a href="/students">View All Students</a>

</div>

<script>
let otpVerified = false;

function sendOTP() {
    let phone = document.getElementById('phone').value.trim();

    fetch('/send_otp', {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: 'phone=' + encodeURIComponent(phone)
    })
    .then(res => res.json())
    .then(data => alert(data.message));
}

function verifyOTP() {
    let phone = document.getElementById('phone').value.trim();
    let otp   = document.getElementById('otp').value.trim();

    fetch('/verify_otp', {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: 'phone=' + encodeURIComponent(phone) + '&otp=' + encodeURIComponent(otp)
    })
    .then(res => res.json())
    .then(data => {
        let status = document.getElementById('status');
        if (data.status === "success") {
            otpVerified = true;
            status.innerText = "✅ Verified";
            status.style.color = "green";
        } else {
            status.innerText = "❌ " + data.message;
            status.style.color = "red";
        }
    });
}

function checkForm(event) {
    if (!otpVerified) {
        alert("Verify OTP first!");
        event.preventDefault();
    }
}
</script>

</body>
</html>
